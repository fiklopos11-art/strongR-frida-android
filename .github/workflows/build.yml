name: strongR-frida-auto

on:
  workflow_dispatch:

jobs: 
  android_build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: "temurin"
        java-version: "17"

    - name: Setup Android NDK
      id: setup-ndk
      uses: nttld/setup-ndk@v1.0.6
      with:
        ndk-version: r25b
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v5.1.0
      with:
        python-version: '3.9'

    - name: install dependencies
      run: |
        sudo apt-get update && DEBIAN_FRONTEND=noninteractive sudo apt-get install build-essential tree ninja-build gcc-multilib g++-multilib lib32stdc++-9-dev flex bison ruby ruby-dev python3-requests python3-setuptools python3-dev python3-pip libc6-dev libc6-dev-i386 -y
        sudo gem install fpm -v 1.11.0 --no-document
        python3 -m pip install lief graphlib

    - name: build frida for Android
      shell: bash
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
        export ANDROID_NDK_ROOT="${{ steps.setup-ndk.outputs.ndk-path }}"
        
        # Клонируем официальную, чистую и самую стабильную Frida последней версии
        git clone --depth 1 --recurse-submodules "https://github.com"
        cd frida
        
        # Автоматический скрипт патчинга (Убираем "frida" из строк ядра)
        echo "[+] Начинаем маскировку Frida от DexProtector..."
        find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.py" -o -name "*.txt" \) -exec sed -i 's/frida_/patched_/g' {} +
        find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.py" -o -name "*.txt" \) -exec sed -i 's/Frida/Patched/g' {} +
        find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.vala" -o -name "*.py" -o -name "*.txt" \) -exec sed -i 's/"frida"/"patched"/g' {} +
        echo "[+] Маскировка завершена успешно!"
        
        # Собираем только под самую важную для телефонов архитектуру arm64 (это ускорит сборку в 4 раза)
        ARCHES="android-arm64"
        for ARCH in $ARCHES
        do
          mkdir "build-$ARCH"
          cd "build-$ARCH"
          ../frida/configure --host=$ARCH
          make
          cd ..
        done
        
        # Архивируем результат
        echo "[+] Сборка завершена. Упаковываем hluda-server..."
        gzip -c build-android-arm64/subprojects/frida-core/server/frida-server > ../hluda-server-android-arm64.gz
        
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: hluda-server-arm64
        path: hluda-server-android-arm64.gz
